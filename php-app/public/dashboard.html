<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeBench | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen p-8">

    <div id="authView" class="max-w-md mx-auto mt-20 bg-gray-800 p-8 rounded-xl border border-gray-700">
        <h1 class="text-3xl font-bold text-blue-500 mb-6 text-center">TradeBench</h1>
        <div id="authError" class="hidden mb-4 p-3 bg-red-900/50 border border-red-500 text-red-200 text-sm rounded"></div>
        <form id="authForm" class="space-y-4">
            <div>
                <label class="block text-sm text-gray-400 mb-1">Email</label>
                <input type="email" id="email" required class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">Пароль</label>
                <input type="password" id="password" required class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white outline-none focus:border-blue-500">
            </div>
            <div class="flex gap-4 pt-4">
                <button type="button" onclick="handleAuth('login')" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition">Увійти</button>
                <button type="button" onclick="handleAuth('register')" class="w-full bg-gray-700 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded transition">Реєстрація</button>
            </div>
        </form>
    </div>

    <div id="dashboardView" class="hidden max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-gray-800 pb-4">
            <h1 class="text-3xl font-bold text-blue-500">TradeBench <span class="text-gray-500 text-lg">Control Center</span></h1>
            <button onclick="logout()" class="text-sm text-gray-400 hover:text-white transition">Вийти з акаунта</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 lg:col-span-1 h-fit">
                <h2 class="text-xl font-semibold mb-4 text-purple-400">Джерело даних</h2>
                <p class="text-sm text-gray-400 mb-4">Завантажте історичні дані свічок з Binance для розрахунків у C++.</p>
                <div class="mb-4">
                    <label class="block text-sm text-gray-400 mb-1">Ринок</label>
                    <select id="syncPair" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white outline-none focus:border-purple-500">
                        <option value="BTCUSDT">BTC/USDT</option>
                        <option value="EURUSDT">EUR/USDT</option>
                    </select>
                </div>
                <button id="syncBtn" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-4 rounded transition flex justify-center items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    Синхронізувати
                </button>
                <div id="syncStatus" class="mt-3 text-sm text-center hidden"></div>
            </div>

            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 lg:col-span-1 h-fit">
                <h2 class="text-xl font-semibold mb-4 text-blue-400">Аналітика</h2>
                <div class="mb-4">
                    <label class="block text-sm text-gray-400 mb-1">Валютна пара</label>
                    <select id="pair" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white outline-none focus:border-blue-500">
                        <!-- Змінено value на BTCUSDT та EURUSDT, щоб співпадало з БД -->
                        <option value="BTCUSDT">BTC/USDT</option>
                        <option value="EURUSDT">EUR/USDT</option>
                    </select>
                </div>
                <div class="mb-6">
                    <label class="block text-sm text-gray-400 mb-1">Стратегія</label>
                    <select id="strategy" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white outline-none focus:border-blue-500">
                        <option value="SMA_CROSS">SMA Crossover (9, 21)</option>
                    </select>
                </div>
                <button id="startBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition">
                    Запустити бектест
                </button>
            </div>

            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 flex flex-col items-center text-center lg:col-span-1 min-h-[350px] relative w-full overflow-hidden">
                <div id="idleState" class="text-gray-500 mt-16">
                    <svg class="w-16 h-16 mx-auto mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                    <p>Очікування запуску...</p>
                </div>

                <div id="processingState" class="hidden w-full mt-16">
                    <h3 class="text-lg font-bold text-blue-400 mb-2">Обчислення в C++</h3>
                    <p id="taskIdDisplay" class="text-xs text-gray-500 mb-4 font-mono truncate px-2"></p>
                    <div class="w-full bg-gray-700 rounded-full h-2.5 mb-4">
                        <div class="bg-blue-600 h-2.5 rounded-full w-1/2 animate-pulse"></div>
                    </div>
                    <p class="text-sm text-gray-400">Синхронізація через SSE...</p>
                </div>

                <div id="completedState" class="hidden w-full h-full flex flex-col">
                    <div class="flex justify-between w-full mb-2">
                        <div class="text-left">
                            <p class="text-xs text-gray-400">Стартовий баланс</p>
                            <p class="font-bold text-white">$1000.00</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xs text-gray-400">Зміна капіталу</p>
                            <p id="profitDisplay" class="font-bold"></p>
                        </div>
                    </div>
                    <p id="tradesDisplay" class="text-xs text-gray-400 w-full text-left mb-2"></p>
                    
                    <!-- Graph Container -->
                    <div class="flex-grow w-full h-48 relative">
                        <canvas id="equityChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Історія аналізів (NEW) -->
        <div class="mt-8 bg-gray-800 p-6 rounded-xl border border-gray-700">
            <h2 class="text-xl font-semibold mb-4 text-gray-300">Історія бектестів</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm text-gray-400">
                    <thead class="text-xs text-gray-500 uppercase bg-gray-900 border-b border-gray-700">
                        <tr>
                            <th class="px-4 py-3">Дата</th>
                            <th class="px-4 py-3">Пара</th>
                            <th class="px-4 py-3">Статус</th>
                            <th class="px-4 py-3">Прибуток</th>
                            <th class="px-4 py-3">Дія</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody">
                        <!-- Сюди завантажуються минулі результати -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        let equityChartInstance = null;

        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('jwt_token')) showDashboard();
        });

        async function handleAuth(action) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('authError');
            if (!email || !password) return errorDiv.innerText = "Заповніть всі поля", errorDiv.classList.remove('hidden');

            try {
                const response = await fetch(`/api/auth/${action}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error);
                if (action === 'register') handleAuth('login');
                else { localStorage.setItem('jwt_token', data.token); showDashboard(); }
            } catch (error) {
                errorDiv.innerText = error.message; errorDiv.classList.remove('hidden');
            }
        }

        function showDashboard() {
            document.getElementById('authView').classList.add('hidden');
            document.getElementById('dashboardView').classList.remove('hidden');
            setupEventStream();
            loadHistory();
        }

        function logout() {
            localStorage.removeItem('jwt_token');
            document.getElementById('dashboardView').classList.add('hidden');
            document.getElementById('authView').classList.remove('hidden');
            if (window.eventSource) window.eventSource.close();
            if (equityChartInstance) equityChartInstance.destroy();
            document.getElementById('historyTableBody').innerHTML = '';
        }

        let currentTaskId = null;

        /* Fetch and display task history */
        async function loadHistory() {
            const token = localStorage.getItem('jwt_token');
            if (!token) return;
            try {
                const res = await fetch('/api/analysis/history', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                const tbody = document.getElementById('historyTableBody');
                tbody.innerHTML = '';
                
                data.forEach(task => {
                    let resultData = task.result_data ? JSON.parse(task.result_data) : null;
                    let profitText = resultData ? `$${resultData.profit.toFixed(2)}` : '-';
                    let profitClass = resultData && resultData.profit >= 0 ? 'text-green-500' : (resultData ? 'text-red-500' : '');
                    let date = new Date(task.created_at).toLocaleString('uk-UA');

                    let actionBtn = resultData ? `<button onclick='viewHistoricalChart(this)' data-result='${task.result_data}' class="text-blue-400 hover:text-blue-300">Переглянути</button>` : '-';

                    tbody.innerHTML += `
                        <tr class="border-b border-gray-800 hover:bg-gray-750">
                            <td class="px-4 py-3">${date}</td>
                            <td class="px-4 py-3 font-bold text-white">${task.pair}</td>
                            <td class="px-4 py-3">${task.status}</td>
                            <td class="px-4 py-3 font-bold ${profitClass}">${profitText}</td>
                            <td class="px-4 py-3">${actionBtn}</td>
                        </tr>
                    `;
                });
            } catch (e) {
                console.error("Failed to load history", e);
            }
        }

        /* Render chart from history */
        window.viewHistoricalChart = function(btn) {
            const resultData = JSON.parse(btn.getAttribute('data-result'));
            
            document.getElementById('idleState').classList.add('hidden');
            document.getElementById('processingState').classList.add('hidden');
            document.getElementById('completedState').classList.remove('hidden');

            const profitEl = document.getElementById('profitDisplay');
            profitEl.innerText = `${resultData.profit >= 0 ? '+' : ''}$${resultData.profit.toFixed(2)}`;
            profitEl.className = `font-bold ${resultData.profit >= 0 ? 'text-green-500' : 'text-red-500'}`;
            document.getElementById('tradesDisplay').innerText = `Кількість угод: ${resultData.trades}`;

            if (resultData.equity && resultData.equity.length > 0) {
                renderChart(resultData.equity);
            }
            
            /* Scroll top smoothly */
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        function renderChart(equityData) {
            const ctx = document.getElementById('equityChart').getContext('2d');
            
            if (equityChartInstance) {
                equityChartInstance.destroy();
            }

            const labels = equityData.map((_, i) => i);
            const isProfit = equityData[equityData.length - 1] >= 1000;
            const color = isProfit ? '#22c55e' : '#ef4444'; // Green or Red
            const bgColor = isProfit ? 'rgba(34, 197, 94, 0.1)' : 'rgba(239, 68, 68, 0.1)';

            equityChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Капітал ($)',
                        data: equityData,
                        borderColor: color,
                        backgroundColor: bgColor,
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: true,
                        tension: 0.2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: { 
                            ticks: { color: '#9ca3af', font: { size: 10 } },
                            grid: { color: '#374151' }
                        }
                    }
                }
            });
        }

        function setupEventStream() {
            const token = localStorage.getItem('jwt_token');
            if (!token) return;
            window.eventSource = new EventSource(`/api/analysis/stream?token=${token}`);
            window.eventSource.onmessage = function(event) {
                const data = JSON.parse(event.data);
                if (data.task_id === currentTaskId && data.status === 'COMPLETED') {
                    document.getElementById('processingState').classList.add('hidden');
                    document.getElementById('completedState').classList.remove('hidden');
                    document.getElementById('startBtn').disabled = false;
                    
                    const profitEl = document.getElementById('profitDisplay');
                    profitEl.innerText = `${data.profit >= 0 ? '+' : ''}$${data.profit.toFixed(2)}`;
                    profitEl.className = `font-bold ${data.profit >= 0 ? 'text-green-500' : 'text-red-500'}`;
                    
                    document.getElementById('tradesDisplay').innerText = `Кількість угод: ${data.trades}`;
                    
                    if (data.equity && data.equity.length > 0) {
                        renderChart(data.equity);
                    }
                    
                    /* Refresh history table to show the new result */
                    loadHistory();
                }
            };
        }

        document.getElementById('syncBtn').addEventListener('click', async () => {
            const pair = document.getElementById('syncPair').value;
            const token = localStorage.getItem('jwt_token');
            const btn = document.getElementById('syncBtn');
            const status = document.getElementById('syncStatus');
            
            btn.disabled = true;
            btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Завантаження...`;
            status.classList.add('hidden');

            try {
                const response = await fetch('/api/data/sync', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ pair })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error);
                status.innerText = `✅ Додано ${data.records_inserted} свічок!`;
                status.className = "mt-3 text-sm text-center text-green-400 block";
            } catch (error) {
                status.innerText = `❌ Помилка: ${error.message}`;
                status.className = "mt-3 text-sm text-center text-red-400 block";
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> Синхронізувати`;
            }
        });

        document.getElementById('startBtn').addEventListener('click', async () => {
            const pair = document.getElementById('pair').value;
            const strategy = document.getElementById('strategy').value;
            const token = localStorage.getItem('jwt_token');
            
            document.getElementById('idleState').classList.add('hidden');
            document.getElementById('completedState').classList.add('hidden');
            document.getElementById('processingState').classList.remove('hidden');
            document.getElementById('startBtn').disabled = true;

            try {
                const response = await fetch('/api/analysis/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ pair, strategy })
                });
                if (response.status === 401) { logout(); return; }
                const data = await response.json();
                if (!response.ok) throw new Error(data.error);
                
                currentTaskId = data.task_id;
                document.getElementById('taskIdDisplay').innerText = `ID: ${currentTaskId}`;
            } catch (error) {
                alert(`Помилка: ${error.message}`);
                document.getElementById('startBtn').disabled = false;
                document.getElementById('idleState').classList.remove('hidden');
                document.getElementById('processingState').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
