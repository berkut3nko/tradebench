<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeBench | Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen">

    <!-- Navbar -->
    <nav class="bg-gray-800 border-b border-gray-700 px-8 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-bold text-red-500">TradeBench <span class="text-gray-300 text-lg">Admin</span></h1>
            <span class="bg-red-500/20 text-red-400 border border-red-500/50 px-2 py-0.5 rounded text-xs font-bold uppercase tracking-wider">Superuser</span>
        </div>
        <div class="flex gap-4">
            <button onclick="window.location.href='dashboard.html'" class="text-sm bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded transition flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Повернутись до застосунку
            </button>
            <button onclick="logout()" class="text-sm text-gray-400 hover:text-white transition">Вийти</button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-8">
        
        <!-- Error/Success Notifications -->
        <div id="notificationArea" class="hidden mb-6 p-4 rounded-lg text-sm font-medium"></div>

        <!-- System Stats Module -->
        <h2 class="text-xl font-bold text-gray-300 mb-4 flex items-center gap-2">
            <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
            Статистика системи
        </h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                <p class="text-sm text-gray-400 uppercase tracking-wide">Всього користувачів</p>
                <p id="statUsers" class="text-4xl font-bold text-white mt-2">-</p>
            </div>
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                <p class="text-sm text-gray-400 uppercase tracking-wide">Проведено аналізів</p>
                <p id="statTasks" class="text-4xl font-bold text-blue-400 mt-2">-</p>
            </div>
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                <p class="text-sm text-gray-400 uppercase tracking-wide">Точок даних (Свічок)</p>
                <p id="statData" class="text-4xl font-bold text-purple-400 mt-2">-</p>
            </div>
        </div>

        <!-- Users Management Module -->
        <h2 class="text-xl font-bold text-gray-300 mb-4 flex items-center gap-2">
            <svg class="w-6 h-6 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            Керування користувачами
        </h2>
        <div class="bg-gray-800 rounded-xl border border-gray-700 shadow-lg overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm text-gray-300">
                    <thead class="text-xs text-gray-400 uppercase bg-gray-900/50 border-b border-gray-700">
                        <tr>
                            <th class="px-6 py-4 font-semibold">ID</th>
                            <th class="px-6 py-4 font-semibold">Email</th>
                            <th class="px-6 py-4 font-semibold">Роль</th>
                            <th class="px-6 py-4 font-semibold">Дата реєстрації</th>
                            <th class="px-6 py-4 font-semibold text-right">Дії</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody" class="divide-y divide-gray-700">
                        <!-- Users will be injected here via JS -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- Modal for Editing User -->
    <div id="editUserModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 w-96 shadow-2xl">
            <h3 class="text-xl font-bold text-white mb-4">Редагування користувача</h3>
            <input type="hidden" id="editUserId">
            <div class="mb-4">
                <label class="block text-sm text-gray-400 mb-1">Роль користувача</label>
                <select id="editUserRole" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white outline-none focus:border-blue-500">
                    <option value="standard">Standard</option>
                    <option value="pro">PRO</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <div class="flex justify-end gap-3 mt-6">
                <button onclick="closeEditModal()" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded text-white text-sm transition">Скасувати</button>
                <button onclick="saveUserEdit()" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded text-white text-sm transition font-bold">Зберегти</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAdminAccess();
        });

        function showNotification(message, isError = false) {
            const notif = document.getElementById('notificationArea');
            notif.innerText = message;
            notif.className = `mb-6 p-4 rounded-lg text-sm font-medium ${isError ? 'bg-red-900/50 text-red-200 border border-red-500' : 'bg-green-900/50 text-green-200 border border-green-500'}`;
            notif.classList.remove('hidden');
            setTimeout(() => notif.classList.add('hidden'), 5000);
        }

        async function checkAdminAccess() {
            const token = localStorage.getItem('jwt_token');
            const role = localStorage.getItem('user_role');

            if (!token || role !== 'admin') {
                alert('Доступ заборонено. Потрібні права адміністратора.');
                window.location.href = 'dashboard.html';
                return;
            }

            // Load data if authorized
            await loadStats();
            await loadUsers();
        }

        async function apiRequest(endpoint, method = 'GET', body = null) {
            const token = localStorage.getItem('jwt_token');
            const options = {
                method: method,
                headers: { 'Authorization': `Bearer ${token}` }
            };
            if (body) {
                options.headers['Content-Type'] = 'application/json';
                options.body = JSON.stringify(body);
            }
            
            try {
                const response = await fetch(endpoint, options);
                const data = await response.json();
                
                if (!response.ok) {
                    if (response.status === 401 || response.status === 403) {
                        alert('Сесія закінчилась або недостатньо прав.');
                        window.location.href = 'dashboard.html';
                        throw new Error("Unauthorized");
                    }
                    throw new Error(data.error || 'API Error');
                }
                return data;
            } catch (error) {
                showNotification(error.message, true);
                throw error;
            }
        }

        async function loadStats() {
            try {
                const stats = await apiRequest('/api/admin/stats');
                document.getElementById('statUsers').innerText = stats.total_users;
                document.getElementById('statTasks').innerText = stats.total_analyses_run;
                document.getElementById('statData').innerText = stats.market_data_points;
            } catch (e) {
                console.error("Failed to load stats", e);
            }
        }

        async function loadUsers() {
            try {
                const users = await apiRequest('/api/admin/users');
                const tbody = document.getElementById('usersTableBody');
                tbody.innerHTML = '';
                
                users.forEach(user => {
                    const date = new Date(user.created_at).toLocaleString('uk-UA');
                    
                    let roleBadge = '';
                    if (user.role === 'admin') {
                        roleBadge = `<span class="bg-red-500/20 text-red-400 px-2 py-1 rounded text-xs font-bold uppercase border border-red-500/30">Admin</span>`;
                    } else if (user.role === 'pro') {
                        roleBadge = `<span class="bg-yellow-500/20 text-yellow-400 px-2 py-1 rounded text-xs font-bold uppercase border border-yellow-500/30">Pro</span>`;
                    } else {
                        roleBadge = `<span class="bg-gray-600/50 text-gray-300 px-2 py-1 rounded text-xs font-bold uppercase border border-gray-500/50">Standard</span>`;
                    }

                    // Cannot delete or edit oneself
                    let actionBtn = `
                        <div class="flex justify-end gap-3">
                            <button onclick="openEditModal(${user.id}, '${user.role}')" class="text-blue-400 hover:text-blue-300 font-medium transition flex items-center gap-1" title="Редагувати роль">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                            </button>
                            <button onclick="deleteUser(${user.id})" class="text-red-400 hover:text-red-300 font-medium transition flex items-center gap-1" title="Видалити">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    `;
                    
                    const currentUserId = parseJwt(localStorage.getItem('jwt_token')).sub;
                    if (user.id == currentUserId) {
                        actionBtn = `<span class="text-gray-500 italic text-xs">Це ви</span>`;
                    }

                    tbody.innerHTML += `
                        <tr class="hover:bg-gray-750 transition-colors">
                            <td class="px-6 py-4 font-mono text-gray-400">${user.id}</td>
                            <td class="px-6 py-4 font-medium text-white">${user.email}</td>
                            <td class="px-6 py-4">${roleBadge}</td>
                            <td class="px-6 py-4 text-gray-400 text-sm">${date}</td>
                            <td class="px-6 py-4 text-right">${actionBtn}</td>
                        </tr>
                    `;
                });
            } catch (e) {
                console.error("Failed to load users", e);
            }
        }

        async function deleteUser(userId) {
            if (!confirm(`Ви впевнені, що хочете видалити користувача ID ${userId}? Всі його бектести також будуть видалені.`)) {
                return;
            }

            try {
                const result = await apiRequest(`/api/admin/users/${userId}`, 'DELETE');
                showNotification(result.message);
                
                // Refresh UI
                loadStats();
                loadUsers();
            } catch (e) {
                // Error already handled
            }
        }

        function openEditModal(userId, currentRole) {
            document.getElementById('editUserId').value = userId;
            document.getElementById('editUserRole').value = currentRole;
            document.getElementById('editUserModal').classList.remove('hidden');
        }

        function closeEditModal() {
            document.getElementById('editUserModal').classList.add('hidden');
        }

        async function saveUserEdit() {
            const userId = document.getElementById('editUserId').value;
            const newRole = document.getElementById('editUserRole').value;

            try {
                const result = await apiRequest(`/api/admin/users/${userId}`, 'PUT', { role: newRole });
                showNotification(result.message);
                closeEditModal();
                loadUsers();
            } catch (e) {
                // Error handled in apiRequest
            }
        }

        function logout() {
            apiRequest('/api/auth/logout', 'POST').catch(e => console.error(e));
            localStorage.removeItem('jwt_token');
            localStorage.removeItem('user_role');
            window.location.href = 'dashboard.html';
        }

        function parseJwt(token) {
            try {
                return JSON.parse(atob(token.split('.')[1]));
            } catch (e) {
                return null;
            }
        }
    </script>
</body>
</html>
