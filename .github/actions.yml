name: C++ CI (TradeBench)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential libgrpc++-dev protobuf-compiler-grpc libpqxx-dev libhiredis-dev libgtest-dev

    - name: Configure CMake
      run: cmake -S cpp-core -B cpp-core/build

    - name: Build
      run: cmake --build cpp-core/build

    - name: Run Unit Tests
      run: cd cpp-core/build && ctest --output-on-failure