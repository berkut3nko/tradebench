name: TradeBench CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  cpp-tests:
    name: Build & Test C++ Core
    if: contains(github.event.head_commit.message, '[run-ci]') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install C++ Stack
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libgrpc++-dev protobuf-compiler-grpc libpqxx-dev libhiredis-dev libgtest-dev
          
      - name: Proto Compilation Check
        run: |
          mkdir -p cpp-core/proto
          protoc --proto_path=proto --cpp_out=cpp-core/proto --grpc_out=cpp-core/proto --plugin=protoc-gen-grpc=`which grpc_cpp_plugin` proto/analysis.proto

      - name: Build and Run C++ Tests
        run: |
          cmake -S cpp-core -B cpp-core/build
          cmake --build cpp-core/build
          cd cpp-core/build && ./run_tests

  php-tests:
    name: Build & Test PHP Backend
    if: contains(github.event.head_commit.message, '[run-ci]') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: grpc, pdo_pgsql, redis
          
      - name: Install Dependencies
        run: |
          cd php-app
          composer install --no-progress --prefer-dist
        
      - name: Generate PHP Proto Classes
        run: |
          sudo apt-get install -y protobuf-compiler
          mkdir -p php-app/proto
          protoc --proto_path=proto --php_out=php-app/proto proto/analysis.proto
        
      - name: Run PHPUnit
        run: |
          cd php-app
          ./vendor/bin/phpunit tests